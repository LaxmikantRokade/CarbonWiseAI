  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CarbonWise AI — Track, understand, and reduce your carbon footprint with personalized AI insights, gamification, and beautiful analytics." />
    <meta name="keywords" content="carbon footprint, sustainability, eco tracker, carbon calculator, climate action, green living" />
    <meta name="author" content="CarbonWise AI" />
    <meta name="theme-color" content="#10b981" />
    <meta property="og:title" content="CarbonWise AI — Your Personal Carbon Footprint Tracker" />
    <meta property="og:description" content="Track, understand, and reduce your carbon footprint with personalized AI insights and beautiful analytics." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CarbonWise AI" />

  </head>
  <body class="bg-gray-50 dark:bg-carbon-950 text-gray-900 dark:text-gray-100 transition-colors duration-300">
    <div id="debug-log" style="display: none; position: fixed; top: 0; left: 0; right: 0; background: rgba(0,0,0,0.8); color: #0f0; z-index: 99999; font-family: monospace; font-size: 11px; padding: 10px; max-height: 50vh; overflow-y: auto;">[Init Logger]</div>
    <script>
      window.logDebug = function(msg) {
        var el = document.getElementById('debug-log');
        if (el) el.innerHTML += '<br/>' + msg;
        console.log(msg);
      };
      window.addEventListener('error', function(e) {
        window.logDebug('Global Error: ' + e.message + ' at ' + e.filename + ':' + e.lineno);
      });
      window.addEventListener('unhandledrejection', function(e) {
        window.logDebug('Unhandled Promise: ' + e.reason);
      });
      window.logDebug('index.html script executed');
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
